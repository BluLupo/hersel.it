<!--Header-->
{% include "header.html" %}
<div class="container">
    <h1>Blog di {{me.name}}</h1>

    {% for article in articles %}
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ article['title'] }}</h5>
                <p class="card-text">{{ article['content'][:250] }}...</p>
                <p class="card-author">Author: {{ article['username'] }}</p>
                <a href="{{ url_for('route_article.view_article', article_id=article['articleid']) }}" class="btn btn-primary">Read More</a>
            </div>
        </div>
    {% endfor %}
    <br />
    <!-- Mostra la paginazione -->
    {{ pagination.links }}
</div>
<!--Footer-->
{% include "footer.html" %}
